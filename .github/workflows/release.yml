name: Auto Tag Release

on:
  push:
    branches: ["main"]

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout main

      - name: Read current version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Decide bump type
        id: bump_type
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" == *"#minor"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.version.outputs.current }}"
          if [[ "${{ steps.bump_type.outputs.type }}" == "minor" ]]; then
            minor=$((minor+1))
            patch=0
          else
            patch=$((patch+1))
          fi
          NEW_VERSION="$major.$minor.$patch"
          echo $NEW_VERSION > VERSION
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git push origin main

      - name: Create and push tag
        run: |
          git tag v${{ steps.bump.outputs.new }}
          git push origin v${{ steps.bump.outputs.new }}