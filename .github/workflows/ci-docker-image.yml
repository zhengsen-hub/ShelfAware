name: Python CI with Docker

on:
  push:
    branches: ["main"]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: ["main"]

env:
  DOCKER_IMAGE: zhengsenlim/shelfaware_app

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # set these secrets in the GitHub repository settings
      # these are used to run the tests
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
      COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
      COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
      COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
      COGNITO_USER_ROLE: ${{ secrets.COGNITO_USER_ROLE }}
      COGNITO_ADMIN_ROLE: ${{ secrets.COGNITO_ADMIN_ROLE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        env:
          LLM_PROVIDER: OPENAI
        run: |
          python -m pytest -v -s

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # For tag pushes, use the tag name as version
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "TAGS=${{ env.DOCKER_IMAGE }}:$VERSION,${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          else
            # For branch pushes, just use latest
            echo "VERSION=latest" >> $GITHUB_OUTPUT
            echo "TAGS=${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          fi
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # set these secrets in the GitHub repository settings
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.get_version.outputs.TAGS }}

  auto-tag:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Read current version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Decide bump type
        id: bump_type
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" == *"#minor"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.version.outputs.current }}"
          if [[ "${{ steps.bump_type.outputs.type }}" == "minor" ]]; then
            minor=$((minor+1))
            patch=0
          else
            patch=$((patch+1))
          fi
          NEW_VERSION="$major.$minor.$patch"
          echo $NEW_VERSION > VERSION
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
          git push

      - name: Create and push tag
        run: |
          git tag v${{ steps.bump.outputs.new }}
          git push origin v${{ steps.bump.outputs.new }}