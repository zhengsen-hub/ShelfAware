name: Python CI with Docker

on:
  push:
    branches: ["main"]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: ["main"]

env:
  DOCKER_IMAGE: zhengsenlim/shelfaware_app

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit

      - name: Security scan with Bandit
        run: |
          bandit -r app/ scripts/ -ll -ii
  test:
    needs: security
    runs-on: ubuntu-latest
    env:
      # set these secrets in the GitHub repository settings
      # these are used to run the tests
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
      COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
      COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
      COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
      COGNITO_USER_ROLE: ${{ secrets.COGNITO_USER_ROLE }}
      COGNITO_ADMIN_ROLE: ${{ secrets.COGNITO_ADMIN_ROLE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        env:
          LLM_PROVIDER: OPENAI
        run: |
          python -m pytest -v -s

  test-frontend:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend Dependencies
        working-directory: ./ref_frontend
        run: npm ci
      - name: Build Frontend
        working-directory: ./ref_frontend
        run: npm run build

  build-and-push:
    needs: [test, test-frontend]
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # For tag pushes, use the tag name as version
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "TAGS=${{ env.DOCKER_IMAGE }}:$VERSION,${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          else
            # For branch pushes, just use latest
            echo "VERSION=latest" >> $GITHUB_OUTPUT
            echo "TAGS=${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # set these secrets in the GitHub repository settings
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.get_version.outputs.TAGS }}
          build-args: |
            VITE_API_BASE_URL=""

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # This job should only run on pushes to the main branch or on tags, not on pull requests.
    if: github.event_name == 'push'
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definitions/task-definition.json
          container-name: bookcontainer
          image: ${{ env.DOCKER_IMAGE }}:${{ needs.build-and-push.outputs.IMAGE_TAG }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Output Application URLs
        run: |
          echo "Waiting for task to be fully provisioned..."
          # Give a small buffer for the ENI and Public IP to be fully associated
          sleep 10

          # 1. Get the Task ARN of the newly running task
          TASK_ARN=$(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_SERVICE }} --desired-status RUNNING --query 'taskArns[0]' --output text)
          echo "Task ARN: $TASK_ARN"

          # 2. Get the Network Interface ID (ENI) attached to that task
          ENI_ID=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text)
          echo "ENI ID: $ENI_ID"

          # 3. Get the Public IP address for that ENI
          PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI_ID --query 'NetworkInterfaces[0].Association.PublicIp' --output text)
          echo "PUBLIC_IP: $PUBLIC_IP"

          echo "--------------------------------------------------------------------------------"
          echo "🚀 Deployment successful! You can access the application at the following links:"
          echo "Web App (Frontend):   http://$PUBLIC_IP:8000/"
          echo "API Documentation:    http://$PUBLIC_IP:8000/docs"
          echo "Health Check:         http://$PUBLIC_IP:8000/books"
          echo "--------------------------------------------------------------------------------"