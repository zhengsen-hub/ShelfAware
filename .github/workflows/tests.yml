name: Tests

on:
  push:
    # include main and any feature branches so CI runs for your book CRUD branch
    branches:
      - "main"
      - "feature/mood-recommendation-clean"
      - "feature/bookCRUD"     # ensure new branch triggers tests
      - "feature/*"            # wildcard covers future feature branches
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
